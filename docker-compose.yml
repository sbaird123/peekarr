services:
  peekarr:
    image: ghcr.io/yourusername/peekarr:latest
    container_name: peekarr
    # To build locally instead of pulling, comment out `image:` above
    # and uncomment:
    # build: .
    ports:
      - "3000:3000"
    volumes:
      - ./config:/config
    environment:
      - TZ=Etc/UTC
      # Optional: pre-seed config on first run (UI still takes precedence once saved)
      # - TMDB_API_KEY=
      # - RADARR_URL=http://radarr:7878
      # - RADARR_API_KEY=
      # - SONARR_URL=http://sonarr:8989
      # - SONARR_API_KEY=
    restart: unless-stopped
    # If Radarr/Sonarr live in the same compose stack, put them on a shared
    # network and reference them by service name above.
    # networks:
    #   - arrs

# networks:
#   arrs:
#     external: true
